<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Franklin August Trading — Training Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c8aa70; --gold-dark: #a07840; --bg: #1a1410; --bg2: #231c14;
      --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
      --text: #e8dcc8; --muted: #d4c9b8; --dim: #a89880; --faint: #7a6e60; --vfaint: #3a3228;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 50%, #1e1810 100%);
      font-family: 'Source Sans 3', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      color: var(--text);
    }

    header { text-align: center; margin-bottom: 2rem; }
    header p { color: var(--faint); font-size: 0.78rem; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 0.4rem; }
    header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 400; letter-spacing: 0.06em; }

    .tab-bar {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 680px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--dim);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.65rem 1rem;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-align: center;
    }
    .tab-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #1a1410; }
    .tab-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.06); }

    .module { display: none; flex-direction: column; align-items: center; width: 100%; }
    .module.active { display: flex; }

    .progress { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 2rem; }
    .dot { height: 10px; border-radius: 5px; border: none; cursor: pointer; transition: all 0.35s ease; padding: 0; }
    .dot.done     { background: var(--gold); opacity: 0.6; width: 10px; }
    .dot.active   { background: var(--gold); width: 36px; opacity: 1; }
    .dot.upcoming { background: rgba(255,255,255,0.15); width: 10px; opacity: 0.3; }

    .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .step-header { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 1.5rem; }
    .step-icon  { font-size: 1.6rem; }
    .step-label { color: var(--faint); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 0.2rem; }
    .step-title { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 600; color: var(--text); }
    .divider    { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin-bottom: 1.5rem; }

    .content p        { font-size: 1.05rem; line-height: 1.85; color: var(--muted); margin-bottom: 1.25rem; }
    .content p strong { color: var(--text); }
    .content ul       { color: #c8bca8; line-height: 2.1; padding-left: 1.5rem; margin-bottom: 1.75rem; }

    .path-list  { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.25rem 1.5rem; margin-top: 0.5rem; }
    .path-label { color: var(--dim); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.6rem; }
    .path-item  { display: flex; align-items: center; gap: 0.75rem; padding: 0.35rem 0; color: #c8bca8; font-size: 0.97rem; }
    .path-num   { width: 22px; height: 22px; border-radius: 50%; background: rgba(200,170,120,0.18); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; color: var(--gold); flex-shrink: 0; }

    .audio-wrap { margin: 1.5rem 0 0.5rem; }
    audio { width: 100%; border-radius: 8px; outline: none; margin-bottom: 1rem; }
    .speed-label   { color: var(--dim); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.6rem; }
    .speed-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .speed-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--dim);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .speed-btn:hover  { border-color: rgba(200,170,112,0.4); color: var(--gold); }
    .speed-btn.active { background: rgba(200,170,112,0.15); border-color: rgba(200,170,112,0.4); color: var(--gold); }

    .fc-meta          { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; color: var(--dim); font-size: 0.88rem; }
    .fc-counter       { color: var(--gold); font-weight: 700; }
    .fc-scene         { width: 100%; height: 200px; perspective: 1000px; cursor: pointer; margin-bottom: 1.5rem; }
    .fc-card          { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); border-radius: 12px; }
    .fc-card.flipped  { transform: rotateY(180deg); }
    .fc-face          { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; }
    .fc-front         { background: rgba(200,170,112,0.08); border: 1px solid rgba(200,170,112,0.2); }
    .fc-back          { background: rgba(200,170,112,0.15); border: 1px solid rgba(200,170,112,0.35); transform: rotateY(180deg); }
    .fc-hint          { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--faint); margin-bottom: 0.75rem; }
    .fc-text          { font-size: 1.05rem; line-height: 1.65; color: var(--text); }
    .fc-back .fc-text { color: var(--gold); font-weight: 600; }
    .fc-nav           { display: flex; gap: 0.75rem; justify-content: center; align-items: center; }
    .fc-btn           { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #c8bca8; padding: 0.6rem 1.25rem; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-family: 'Source Sans 3', sans-serif; transition: border-color 0.2s, color 0.2s; }
    .fc-btn:hover:not(:disabled) { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .fc-btn:disabled  { opacity: 0.2; cursor: default; }
    .fc-shuffle       { background: rgba(200,170,112,0.1); border: 1px solid rgba(200,170,112,0.25); color: var(--gold); padding: 0.6rem 1.25rem; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-family: 'Source Sans 3', sans-serif; transition: background 0.2s; }
    .fc-shuffle:hover { background: rgba(200,170,112,0.18); }
    .fc-progress-bar  { width: 100%; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-bottom: 1.25rem; }
    .fc-progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.3s ease; }

    .cta-btn       { display: inline-flex; align-items: center; gap: 0.75rem; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #1a1410; padding: 1rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.98rem; letter-spacing: 0.02em; box-shadow: 0 4px 20px rgba(200,170,112,0.3); transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(200,170,112,0.4); }
    .cta-note      { margin-top: 1.1rem; color: var(--faint); font-size: 0.85rem; }
    .quiz-done-btn { margin-top: 1.25rem; background: transparent; border: 1px solid rgba(200,170,112,0.3); color: var(--gold); padding: 0.65rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-family: 'Source Sans 3', sans-serif; transition: background 0.2s; display: block; }
    .quiz-done-btn:hover { background: rgba(200,170,112,0.1); }

    .complete-wrap        { text-align: center; padding: 0.75rem 0; }
    .complete-emoji       { font-size: 3.5rem; margin-bottom: 1rem; }
    .complete-box         { background: rgba(200,170,112,0.08); border: 1px solid rgba(200,170,112,0.18); border-radius: 12px; padding: 1.25rem 1.5rem; display: inline-block; text-align: left; margin-top: 0.5rem; }
    .complete-box .cb-label { color: var(--gold); font-weight: 700; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .complete-box ul      { color: #c8bca8; line-height: 2.1; padding-left: 1.25rem; margin: 0; }

    .nav        { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .btn-back   { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #c8bca8; padding: 0.7rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-family: 'Source Sans 3', sans-serif; transition: border-color 0.2s, color 0.2s; }
    .btn-back:hover:not(:disabled) { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .btn-back:disabled { opacity: 0.2; cursor: default; }
    .btn-next   { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border: none; color: #1a1410; padding: 0.7rem 2rem; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 700; font-family: 'Source Sans 3', sans-serif; letter-spacing: 0.03em; box-shadow: 0 4px 16px rgba(200,170,112,0.25); transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(200,170,112,0.35); }

    footer { color: var(--vfaint); font-size: 0.72rem; margin-top: 2rem; letter-spacing: 0.12em; text-transform: uppercase; }

    /* ── Name prompt overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 50%, #1e1810 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1rem; z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay header { margin-bottom: 2.5rem; }
    .name-card {
      width: 100%; max-width: 480px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .name-card .step-icon { font-size: 2.5rem; display: block; margin-bottom: 1rem; }
    .name-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .name-card p  { font-size: 0.97rem; color: var(--dim); margin-bottom: 1.75rem; line-height: 1.6; }
    .name-input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 0.85rem 1.1rem;
      font-size: 1.05rem; font-family: 'Source Sans 3', sans-serif;
      color: var(--text); outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }
    .name-input:focus { border-color: rgba(200,170,112,0.5); }
    .name-input::placeholder { color: var(--faint); }
    .name-error { color: #f87171; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  </style>
</head>

<script>
/* ── Tab switcher ── */
function switchModule(n) {
  document.getElementById('module1').classList.toggle('active', n === 1);
  document.getElementById('module2').classList.toggle('active', n === 2);
  document.getElementById('tab1').classList.toggle('active', n === 1);
  document.getElementById('tab2').classList.toggle('active', n === 2);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Shared helpers ── */
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function buildDots(current, total, prefix) {
  var out = '';
  for (var i = 0; i < total; i++) {
    var cls = i < current ? 'done' : i === current ? 'active' : 'upcoming';
    out += '<button class="dot ' + cls + '" onclick="' + prefix + 'GoTo(' + i + ')" title="Step ' + (i+1) + '"></button>';
  }
  return out;
}
