<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioTek Product Training — Franklin August Trading</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c8aa70;
      --gold-dark: #a07840;
      --bg: #1a1410;
      --bg2: #231c14;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8dcc8;
      --muted: #d4c9b8;
      --dim: #a89880;
      --faint: #7a6e60;
      --vfaint: #3a3228;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 50%, #1e1810 100%);
      font-family: 'Source Sans 3', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: var(--text);
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }
    header p { color: var(--faint); font-size: 0.78rem; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 0.4rem; }
    header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 400; letter-spacing: 0.06em; }

    .progress { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 2rem; animation: fadeDown 0.6s 0.1s ease both; }
    .dot { height: 10px; border-radius: 5px; border: none; cursor: pointer; transition: all 0.35s ease; padding: 0; }
    .dot.done  { background: var(--gold); opacity: 0.6; width: 10px; }
    .dot.active { background: var(--gold); width: 36px; opacity: 1; }
    .dot.upcoming { background: rgba(255,255,255,0.15); width: 10px; opacity: 0.3; }

    .card {
      width: 100%; max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .step-header { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 1.5rem; }
    .step-icon { font-size: 1.6rem; }
    .step-label { color: var(--faint); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 0.2rem; }
    .step-title { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 600; color: var(--text); }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin-bottom: 1.5rem; }

    .content p { font-size: 1.05rem; line-height: 1.85; color: var(--muted); margin-bottom: 1.25rem; }
    .content p strong { color: var(--text); }
    .content ul { color: #c8bca8; line-height: 2.1; padding-left: 1.5rem; margin-bottom: 1.75rem; }

    .path-list { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.25rem 1.5rem; margin-top: 0.5rem; }
    .path-label { color: var(--dim); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.6rem; }
    .path-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.35rem 0; color: #c8bca8; font-size: 0.97rem; }
    .path-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(200,170,120,0.18); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; color: var(--gold); flex-shrink: 0; }

    /* Audio player */
    .audio-wrap { margin: 1.5rem 0; }
    audio { width: 100%; border-radius: 8px; outline: none; }
    audio::-webkit-media-controls-panel { background: rgba(200,170,112,0.12); }

    .cta-btn {
      display: inline-flex; align-items: center; gap: 0.75rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #1a1410; padding: 1rem 2rem; border-radius: 8px;
      text-decoration: none; font-weight: 700; font-size: 0.98rem;
      letter-spacing: 0.02em; box-shadow: 0 4px 20px rgba(200,170,112,0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(200,170,112,0.4); }
    .cta-note { margin-top: 1.1rem; color: var(--faint); font-size: 0.85rem; }

    /* Flashcard deck */
    .fc-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; color: var(--dim); font-size: 0.88rem; }
    .fc-counter { color: var(--gold); font-weight: 700; }

    .fc-scene { width: 100%; height: 200px; perspective: 1000px; cursor: pointer; margin-bottom: 1.5rem; }
    .fc-card {
      width: 100%; height: 100%;
      position: relative; transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
    }
    .fc-card.flipped { transform: rotateY(180deg); }

    .fc-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .fc-front {
      background: rgba(200,170,112,0.08);
      border: 1px solid rgba(200,170,112,0.2);
    }
    .fc-back {
      background: rgba(200,170,112,0.15);
      border: 1px solid rgba(200,170,112,0.35);
      transform: rotateY(180deg);
    }
    .fc-hint { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--faint); margin-bottom: 0.75rem; }
    .fc-text { font-size: 1.05rem; line-height: 1.65; color: var(--text); }
    .fc-back .fc-text { color: var(--gold); font-weight: 600; }

    .fc-nav { display: flex; gap: 0.75rem; justify-content: center; align-items: center; }
    .fc-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.12);
      color: #c8bca8; padding: 0.6rem 1.25rem; border-radius: 8px;
      cursor: pointer; font-size: 0.88rem; font-family: 'Source Sans 3', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }
    .fc-btn:hover:not(:disabled) { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .fc-btn:disabled { opacity: 0.2; cursor: default; }
    .fc-shuffle {
      background: rgba(200,170,112,0.1); border: 1px solid rgba(200,170,112,0.25);
      color: var(--gold); padding: 0.6rem 1.25rem; border-radius: 8px;
      cursor: pointer; font-size: 0.88rem; font-family: 'Source Sans 3', sans-serif;
      transition: background 0.2s;
    }
    .fc-shuffle:hover { background: rgba(200,170,112,0.18); }

    .fc-progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-bottom: 1.25rem; }
    .fc-progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.3s ease; }

    /* Complete */
    .complete-wrap { text-align: center; padding: 0.75rem 0; }
    .complete-emoji { font-size: 3.5rem; margin-bottom: 1rem; }
    .complete-box {
      background: rgba(200,170,112,0.08); border: 1px solid rgba(200,170,112,0.18);
      border-radius: 12px; padding: 1.25rem 1.5rem; display: inline-block; text-align: left; margin-top: 0.5rem;
    }
    .complete-box .cb-label { color: var(--gold); font-weight: 700; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .complete-box ul { color: #c8bca8; line-height: 2.1; padding-left: 1.25rem; margin: 0; }

    /* Nav */
    .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .btn-back { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #c8bca8; padding: 0.7rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-family: 'Source Sans 3', sans-serif; transition: border-color 0.2s, color 0.2s; }
    .btn-back:hover:not(:disabled) { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .btn-back:disabled { opacity: 0.2; cursor: default; }
    .btn-next { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border: none; color: #1a1410; padding: 0.7rem 2rem; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 700; font-family: 'Source Sans 3', sans-serif; letter-spacing: 0.03em; box-shadow: 0 4px 16px rgba(200,170,112,0.25); transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(200,170,112,0.35); }

    footer { color: var(--vfaint); font-size: 0.72rem; margin-top: 2rem; letter-spacing: 0.12em; text-transform: uppercase; }

    .step-content { animation: fadeUp 0.3s ease both; }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(14px);  } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<header>
  <p>Franklin August Trading</p>
  <h1>BioTek Product Training</h1>
</header>

<div class="progress" id="progress"></div>

<div class="card">
  <div class="step-header">
    <span class="step-icon" id="stepIcon"></span>
    <div>
      <div class="step-label" id="stepLabel"></div>
      <div class="step-title" id="stepTitle"></div>
    </div>
  </div>
  <hr class="divider" />
  <div class="content step-content" id="stepContent"></div>
  <div class="nav">
    <button class="btn-back" id="btnBack" onclick="navigate(-1)">← Back</button>
    <button class="btn-next" id="btnNext" onclick="navigate(1)">Next Step →</button>
  </div>
</div>

<footer>Franklin August Trading &nbsp;·&nbsp; Internal Use Only</footer>

<script>
const QUIZ_LINK = "assembly-quiz-interactive.html";
const AUDIO_FILE = "BioTek_Assembly_Numbers_and_Batch_Scheduling.m4a";

const CARDS = [{"q":"What standard prefix is used for all finished assembly numbers at Franklin August Trading?","a":"Every finished assembly number begins with the prefix 90-."},{"q":"What does the 90- prefix signify in the BioTek packaging assembly system?","a":"It identifies the item as a finished packaging assembly ready to ship."},{"q":"How many digits follow the 90- prefix to identify a specific product?","a":"The prefix is followed by a specific seven-digit identification number."},{"q":"What was the total production volume for all top 20 BioTek sets in 2025?","a":"The total production volume reached 8,849 sets."},{"q":"Why is production at Franklin August Trading described as having \"peaks and valleys\"?","a":"Products are manufactured in batches based on demand rather than a steady monthly schedule."},{"q":"Which product is ranked number one by production volume in the 2025 guide?","a":"The H1 Main is the top-ranked product by volume."},{"q":"What is the assembly number for the H1 Main?","a":"The assembly number is 90-8043033."},{"q":"How many sets of the H1 Main were produced annually in 2025?","a":"There were 1,059 sets of the H1 Main produced."},{"q":"What is the typical batch size for an H1 Main production run?","a":"The H1 Main is typically produced in batches of 40 to 50 sets."},{"q":"Which product holds the number two spot for annual production volume?","a":"The Epoch 2 is the second highest volume product."},{"q":"What is the assembly number for the Epoch 2?","a":"The assembly number is 90-1333003."},{"q":"What was the total annual volume for the Epoch 2 in 2025?","a":"The Epoch 2 had an annual volume of 822 sets."},{"q":"What type of outer box construction is used for the Epoch 2?","a":"It uses a single-wall high-performance outer box."},{"q":"Which packaging set is ranked third in production volume?","a":"The Take 3 Set is the third highest volume product."},{"q":"What is the assembly number for the Take 3 Set?","a":"The assembly number is 90-4693003."},{"q":"What was the 2025 annual volume for the Take 3 Set?","a":"The Take 3 Set had an annual volume of 793 sets."},{"q":"How frequently is the Take 3 Set produced during the year?","a":"It is produced in large batches only 2 to 4 times per year."},{"q":"What is the typical batch size for a Take 3 Set production run?","a":"Batch sizes for this set range from 150 to 250 units."},{"q":"Which product is ranked fourth in volume for 2025?","a":"The Washer Accessory is the fourth highest volume product."},{"q":"What is the assembly number for the Washer Accessory?","a":"The assembly number is 90-7103013."},{"q":"How many sets of the Washer Accessory were produced in 2025?","a":"There were 767 sets produced annually."},{"q":"Which BioTek instrument is the Washer Accessory designed for?","a":"It packages accessories for the ELx405 microplate washer."},{"q":"What is the assembly number for the 405 Touch Screen?","a":"The assembly number is 90-1173009."},{"q":"What was the 2025 annual production volume for the 405 Touch Screen?","a":"The annual production volume was 692 sets."},{"q":"What type of outer box is used for the 405 Touch Screen?","a":"It uses a large double-wall outer box."},{"q":"Collectively, how many sets do the top five products account for?","a":"The top five products account for over 4,000 sets."},{"q":"What is the assembly number for the 800 Touch Screen?","a":"The assembly number is 90-1563000."},{"q":"How many sets of the 800 Touch Screen were produced in 2025?","a":"There were 608 sets produced annually."},{"q":"What specific feature is the 800 Touch Screen packaging built around?","a":"It is built around a precision foam system."},{"q":"What is the assembly number for the 50 Touch Screen?","a":"The assembly number is 90-1553004."},{"q":"What was the 2025 annual volume for the 50 Touch Screen?","a":"The annual volume was 520 sets."},{"q":"What is the assembly number for the Touch Screen Valve?","a":"The assembly number is 90-1173008."},{"q":"How many sets of the Touch Screen Valve were produced in 2025?","a":"There were 446 sets produced annually."},{"q":"What is the assembly number for the Synergy packaging set?","a":"The assembly number is 90-7093001."},{"q":"What was the annual production volume for the Synergy set in 2025?","a":"The annual production volume was 361 sets."},{"q":"What instrument does the Synergy packaging set ship?","a":"It ships the BioTek Synergy multimode microplate reader."},{"q":"What is the assembly number for the Cytation Main?","a":"The assembly number is 90-1223018."},{"q":"How many sets of the Cytation Main were produced in 2025?","a":"There were 312 sets produced annually."},{"q":"Which product is described as one of the most complex assemblies due to nested components?","a":"The Cytation Main is described as one of the most complex builds."},{"q":"What instrument is shipped using the Cytation Main assembly?","a":"It ships the BioTek Cytation cell imaging reader."},{"q":"What is the assembly number for the Cytation Accessory?","a":"The assembly number is 90-1223020."},{"q":"How many sets of the Cytation Accessory were produced in 2025?","a":"There were 282 sets produced annually."},{"q":"What is the assembly number for the Biostacker 3?","a":"The assembly number is 90-1163003."},{"q":"What was the annual volume for the Biostacker 3 in 2025?","a":"The annual volume was 257 sets."},{"q":"What instrument is the Biostacker 3 packaging designed for?","a":"It ships the BioTek BioStack microplate stacker."},{"q":"What is the assembly number for the Gas Controller?","a":"The assembly number is 90-1213025."},{"q":"What was the 2025 annual volume for the Gas Controller?","a":"The annual volume was 249 sets."},{"q":"What internal system is used within the Gas Controller outer box?","a":"It utilizes a sleeve system inside the box."},{"q":"What is the assembly number for the standard Epoch set?","a":"The assembly number is 90-7203006."},{"q":"How many sets of the standard Epoch were produced in 2025?","a":"There were 239 sets produced annually."},{"q":"What is the assembly number for the H1 Dispenser?","a":"The assembly number is 90-8043032."},{"q":"How many H1 Dispenser sets were produced in 2025?","a":"There were 217 sets produced annually."},{"q":"The H1 Dispenser assembly (90-8043032) is typically paired with which main unit?","a":"It is paired with the H1 Main (90-8043033)."},{"q":"What is the assembly number for the 405 Q?","a":"The assembly number is 90-1173032."},{"q":"How many 405 Q sets were produced in 2025?","a":"There were 175 sets produced annually."},{"q":"What is the assembly number for the Immucor Accessory?","a":"The assembly number is 90-8063020."},{"q":"What was the annual volume for the Immucor Accessory in 2025?","a":"The annual volume was 144 sets."},{"q":"What design is used for the Immucor Accessory packaging?","a":"It uses a sleeve-in-box design."},{"q":"What is the assembly number for the Immucor main unit?","a":"The assembly number is 90-8063024."},{"q":"How many Immucor main unit sets were produced in 2025?","a":"There were 142 sets produced annually."},{"q":"What unique base component is included in the Immucor main assembly?","a":"It includes a plywood base panel."},{"q":"What is the assembly number for the MFXPW Main?","a":"The assembly number is 90-1263002."},{"q":"How many MFXPW Main sets were produced in 2025?","a":"There were 133 sets produced annually."},{"q":"What instrument is shipped in the MFXPW Main assembly?","a":"It ships the BioTek MultiFlo FX multimode dispenser."},{"q":"What is the assembly number for the Biostacker Accessory?","a":"The assembly number is 90-7313001."},{"q":"How many Biostacker Accessory sets were produced in 2025?","a":"There were 131 sets produced annually."},{"q":"Which item is described as the lowest-cost and simplest item in the top 20?","a":"The Biostacker Accessory is the simplest and lowest-cost item."},{"q":"The Biostacker Accessory (90-7313001) is associated with which main assembly?","a":"It is associated with the Biostacker 3 (90-1163003)."},{"q":"How do the assembly numbers for the Epoch and Epoch 2 differ?","a":"The Epoch is 90-7203006, while the Epoch 2 is 90-1333003."}];

// Flashcard state
let fcDeck = [...CARDS];
let fcIndex = 0;
let fcFlipped = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function flashcardHTML() {
  return `
    <p>Work through the flashcards below to reinforce what you heard in the audio. Click any card to reveal the answer. Focus especially on assembly numbers and which instrument each set ships.</p>
    <div class="fc-progress-bar"><div class="fc-progress-fill" id="fcFill"></div></div>
    <div class="fc-meta">
      <span>Click card to flip</span>
      <span class="fc-counter" id="fcCounter"></span>
    </div>
    <div class="fc-scene" onclick="flipCard()">
      <div class="fc-card" id="fcCard">
        <div class="fc-face fc-front">
          <div class="fc-hint">Question</div>
          <div class="fc-text" id="fcQuestion"></div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-hint">Answer</div>
          <div class="fc-text" id="fcAnswer"></div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-btn" id="fcPrev" onclick="fcNav(-1)">← Prev</button>
      <button class="fc-shuffle" onclick="fcShuffle()">⇄ Shuffle</button>
      <button class="fc-btn" id="fcNext" onclick="fcNav(1)">Next →</button>
    </div>
  `;
}

function renderFC() {
  const card = fcDeck[fcIndex];
  document.getElementById("fcQuestion").textContent = card.q;
  document.getElementById("fcAnswer").textContent = card.a;
  document.getElementById("fcCounter").textContent = `${fcIndex + 1} / ${fcDeck.length}`;
  document.getElementById("fcFill").style.width = `${((fcIndex + 1) / fcDeck.length) * 100}%`;
  document.getElementById("fcPrev").disabled = fcIndex === 0;
  document.getElementById("fcNext").disabled = fcIndex === fcDeck.length - 1;
  // Reset flip
  fcFlipped = false;
  document.getElementById("fcCard").classList.remove("flipped");
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById("fcCard").classList.toggle("flipped", fcFlipped);
}

function fcNav(dir) {
  const next = fcIndex + dir;
  if (next >= 0 && next < fcDeck.length) {
    fcIndex = next;
    renderFC();
  }
}

function fcShuffle() {
  shuffle(fcDeck);
  fcIndex = 0;
  renderFC();
}

// Steps
const steps = [
  {
    icon: "👋", label: "Step 1 of 5", title: "Welcome to Franklin August Trading",
    render: () => `
      <p>You're about to go through your first product training module. This walkthrough covers the <strong>top 20 BioTek Instrument sets</strong> that we manufacture here at Franklin August — the products you'll be working with most on the floor.</p>
      <p>By the end of this training you should be able to recognize product names, recall assembly numbers, and understand the basics of how each set is built.</p>
      <div class="path-list">
        <div class="path-label">Your training path</div>
        ${["Welcome","Listen to the Audio","Review Flashcards","Take the Quiz","You're Done"].map((s,i)=>`
        <div class="path-item"><span class="path-num">${i+1}</span><span>${s}</span></div>`).join("")}
      </div>
    `
  },
  {
    icon: "🎧", label: "Step 2 of 5", title: "Listen to the Training Audio",
    render: () => `
      <p>This audio is a conversation between two Franklin August employees discussing all 20 BioTek sets — their names, assembly numbers, materials, and how they're built.</p>
      <p><strong>Listen through the full audio before moving on.</strong> Don't worry about memorizing everything on the first pass — the flashcards and quiz will reinforce it.</p>
      <div class="audio-wrap">
        <audio controls>
          <source src="${AUDIO_FILE}" type="audio/mp4">
          Your browser does not support the audio element.
        </audio>
      </div>
    `
  },
  {
    icon: "🃏", label: "Step 3 of 5", title: "Review the Flashcards",
    render: () => flashcardHTML(),
    onRender: () => { fcDeck = [...CARDS]; fcIndex = 0; renderFC(); }
  },
  {
    icon: "📝", label: "Step 4 of 5", title: "Take the Quiz",
    render: () => `
      <p>Time to test what you've learned. The quiz covers the same material from the audio and flashcards.</p>
      <p>Don't stress if you don't ace it on the first try — the goal is to identify what you need to review, not to be perfect on day one.</p>
      <a class="cta-btn" href="${QUIZ_LINK}" target="_blank" rel="noreferrer">
        <span>📝</span> Open Quiz in NotebookLM
      </a>
      <p class="cta-note">Opens in a new tab. Return here once you've completed it.</p>
    `
  },
  {
    icon: "✅", label: "Step 5 of 5", title: "Training Complete",
    render: () => `
      <div class="complete-wrap">
        <div class="complete-emoji">🎉</div>
        <p>You've completed the BioTek Product Training module.</p>
        <p style="color:var(--dim);margin-bottom:1.5rem;">Let your supervisor know you've finished. Don't hesitate to revisit the audio or flashcards anytime you need a refresher — product knowledge builds over time.</p>
        <div class="complete-box">
          <div class="cb-label">What you covered:</div>
          <ul>
            <li>Top 20 BioTek Instrument sets by production volume</li>
            <li>Assembly numbers and the 90- prefix system</li>
            <li>Key materials, foam types, and box grades</li>
            <li>Basic construction and assembly process overview</li>
          </ul>
        </div>
      </div>
    `
  }
];

let current = 0;

function render() {
  const s = steps[current];
  document.getElementById("stepIcon").textContent = s.icon;
  document.getElementById("stepLabel").textContent = s.label;
  document.getElementById("stepTitle").textContent = s.title;

  const el = document.getElementById("stepContent");
  el.style.animation = "none"; el.offsetHeight; el.style.animation = "";
  el.innerHTML = s.render();
  if (s.onRender) s.onRender();

  document.getElementById("progress").innerHTML = steps.map((_,i) => {
    const cls = i < current ? "done" : i === current ? "active" : "upcoming";
    return `<button class="dot ${cls}" onclick="goTo(${i})" title="Step ${i+1}"></button>`;
  }).join("");

  document.getElementById("btnBack").disabled = current === 0;
  document.getElementById("btnNext").style.display = current === steps.length - 1 ? "none" : "inline-block";
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < steps.length) { current = next; render(); window.scrollTo({top:0,behavior:"smooth"}); }
}

function goTo(i) { current = i; render(); window.scrollTo({top:0,behavior:"smooth"}); }

render();
</script>
